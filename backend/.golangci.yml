run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - gosimple
    - bodyclose
    - noctx
    - sqlclosecheck

linters-settings:
  gofmt:
    simplify: true
  errcheck:
    check-type-assertions: false   # we do deliberate unchecked assertions in middleware

issues:
  exclude-rules:
    # Allow unused function parameters in interface implementations
    - linters: [unused]
      text: "is unused"
      path: "_test\\.go"
