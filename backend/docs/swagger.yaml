definitions:
  entity.Subscription:
    properties:
      created_at:
        type: string
      id:
        type: integer
      max_csv_tries:
        type: integer
      max_satellite_tries:
        type: integer
      name:
        type: string
      price_uah:
        type: number
      tier:
        $ref: '#/definitions/entity.SubscriptionTier'
      updated_at:
        type: string
    type: object
  entity.SubscriptionTier:
    enum:
    - FREE
    - BASIC
    - PRO
    type: string
    x-enum-varnames:
    - TierFree
    - TierBasic
    - TierPro
  entity.User:
    properties:
      created_at:
        type: string
      id:
        type: integer
      updated_at:
        type: string
      username:
        type: string
    type: object
  entity.UserSubscription:
    properties:
      created_at:
        type: string
      csv_tries_used:
        type: integer
      expires_at:
        type: string
      id:
        type: integer
      satellite_tries_used:
        type: integer
      starts_at:
        type: string
      subscription:
        $ref: '#/definitions/entity.Subscription'
      subscription_id:
        type: integer
      user_id:
        type: integer
    type: object
  httprequest.Login:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  httpresponse.DiscrepancyResponse:
    properties:
      description:
        type: string
      details:
        additionalProperties: {}
        type: object
      id:
        type: integer
      owner_name:
        type: string
      resolution_status:
        type: string
      risk_score:
        type: integer
      rule_code:
        type: string
      severity:
        type: string
      task_id:
        type: string
      tax_id:
        type: string
    type: object
  httpresponse.PaginatedDiscrepanciesResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/httpresponse.DiscrepancyResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  httpresponse.Response:
    properties:
      data: {}
      metadata:
        $ref: '#/definitions/httpresponse.ResponseMetadata'
    type: object
  httpresponse.ResponseMetadata:
    properties:
      error:
        type: string
      message:
        type: string
      status_code:
        type: integer
      timestamp:
        type: string
    type: object
  httpresponse.SummaryResponse:
    properties:
      by_rule:
        additionalProperties:
          type: integer
        type: object
      by_severity:
        additionalProperties:
          type: integer
        type: object
      total_count:
        type: integer
    type: object
  httpresponse.TaskResponse:
    properties:
      completed_at:
        type: string
      created_at:
        type: string
      error_message:
        type: string
      id:
        type: string
      stats:
        $ref: '#/definitions/httpresponse.TaskStatsResponse'
      status:
        type: string
    type: object
  httpresponse.TaskStatsResponse:
    properties:
      discrepancies_count:
        type: integer
      matched:
        type: integer
      total_estate:
        type: integer
      total_land:
        type: integer
    type: object
  httpresponse.UploadTaskResponse:
    properties:
      task_id:
        type: string
    type: object
info:
  contact: {}
  description: swagger documentation.
  title: Best Lviv api docs
  version: "1.0"
paths:
  /v1/audits/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Land registry file (.xlsx or .csv)
        in: formData
        name: land_file
        required: true
        type: file
      - description: Estate registry file (.xlsx or .csv)
        in: formData
        name: estate_file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/httpresponse.UploadTaskResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Upload registry files for audit
      tags:
      - audits
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user using username and password, returning a JWT
        token for further requests.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httprequest.Login'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully authenticated, returns JWT token
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                Data:
                  type: string
              type: object
        "400":
          description: Bad Request - Invalid credentials or validation error
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: User login
      tags:
      - Auth
  /v1/auth/me:
    get:
      consumes:
      - application/json
      description: Retrieves the details of the currently authenticated user using
        the provided JWT token.
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved user profile
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                Data:
                  $ref: '#/definitions/entity.User'
              type: object
        "401":
          description: Unauthorized - Invalid or missing token
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Auth
  /v1/subscriptions:
    get:
      description: Returns all available subscription plans.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                Data:
                  items:
                    $ref: '#/definitions/entity.Subscription'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: List subscription plans
      tags:
      - Subscriptions
  /v1/subscriptions/{id}/purchase:
    post:
      description: Buys a subscription plan for the authenticated user. Only one active
        subscription is allowed per month.
      parameters:
      - description: Subscription plan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                Data:
                  $ref: '#/definitions/entity.UserSubscription'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Purchase a subscription
      tags:
      - Subscriptions
  /v1/subscriptions/me:
    get:
      description: Returns the current active subscription for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                Data:
                  $ref: '#/definitions/entity.UserSubscription'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Get my active subscription
      tags:
      - Subscriptions
  /v1/tasks/{id}:
    get:
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/httpresponse.TaskResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Get task status and stats
      tags:
      - tasks
  /v1/tasks/{id}/discrepancies/{disc_id}:
    get:
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      - description: Discrepancy ID
        in: path
        name: disc_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/httpresponse.DiscrepancyResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Get a single discrepancy detail
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      - description: Discrepancy ID
        in: path
        name: disc_id
        required: true
        type: integer
      - description: New status
        in: body
        name: body
        required: true
        schema:
          properties:
            resolution_status:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Update resolution status of a discrepancy
      tags:
      - tasks
  /v1/tasks/{id}/results:
    get:
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      - description: Filter by severity (LOW|MEDIUM|HIGH)
        in: query
        name: severity
        type: string
      - description: Filter by rule code
        in: query
        name: rule_code
        type: string
      - description: Filter by resolution status
        in: query
        name: resolution_status
        type: string
      - description: Filter by tax ID
        in: query
        name: tax_id
        type: string
      - description: Search in owner name or description
        in: query
        name: search
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 50)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/httpresponse.PaginatedDiscrepanciesResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Get paginated discrepancies for a task
      tags:
      - tasks
  /v1/tasks/{id}/results/summary:
    get:
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/httpresponse.SummaryResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Get discrepancy summary for a task
      tags:
      - tasks
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token, "Bearer <token>".
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
